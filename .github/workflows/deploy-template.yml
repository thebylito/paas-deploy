name: Deploy Template

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_name:
        required: true
        type: string
    secrets:
      CAPROVER_SERVER:
        required: true
      APP_NAME:
        required: true
      APP_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_id: ${{ steps.build_image.outputs.image_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      # Cache Docker layers por ambiente
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        id: build_image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}/$IMAGE_NAME
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          [ "$VERSION" == "master" ] && VERSION=latest

          docker buildx build \
            --cache-from type=gha,scope=${{ inputs.environment }} \
            --cache-from type=gha,scope=global \
            --cache-to type=gha,mode=max,scope=${{ inputs.environment }} \
            --push \
            --tag $IMAGE_ID:$VERSION \
            .

          echo "image_id=$IMAGE_ID:$VERSION" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: caprover/deploy-from-github@main
        with:
          server: "${{ secrets.CAPROVER_SERVER }}"
          app: "${{ secrets.APP_NAME }}"
          token: "${{ secrets.APP_TOKEN }}"
          image: "${{ needs.build-and-push.outputs.image_id }}"
